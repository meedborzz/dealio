<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- Native App Viewport with Edge-to-Edge Display -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <title>Dealio - Find and Book Beauty Deals</title>
  <meta name="description" content="Find and book the best beauty deals near you with Dealio" />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#b892b9" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#9a7a9b" media="(prefers-color-scheme: dark)" />

  <!-- iOS Native App Configuration -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dealio" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Disable iOS Phone Number Detection -->
  <meta name="format-detection" content="telephone=no" />

  <!-- Preload critical fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    /* Prevent iOS pull-to-refresh and overscroll */
    html,
    body {
      overscroll-behavior-y: none;
      -webkit-overflow-scrolling: touch;
    }

    /* Prevent zoom on double-tap */
    * {
      touch-action: manipulation;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./src/main.tsx"></script>
</body>

</html>
